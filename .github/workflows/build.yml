name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            typst_target: x86_64-unknown-linux-musl
            typst_ext: tar.xz
          - os: macos-latest
            label: macos
            typst_target: aarch64-apple-darwin
            typst_ext: tar.xz
          - os: windows-latest
            label: windows
            typst_target: x86_64-pc-windows-msvc
            typst_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download Typst binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          VERSION="0.14.0"
          TARGET="${{ matrix.typst_target }}"
          EXT="${{ matrix.typst_ext }}"
          URL="https://github.com/typst/typst/releases/download/v${VERSION}/typst-${TARGET}.${EXT}"
          echo "Downloading typst from $URL"
          curl -L -o /tmp/typst-archive.${EXT} "$URL"
          tar xf /tmp/typst-archive.${EXT} -C /tmp --strip-components=1 "typst-${TARGET}/typst"
          cp /tmp/typst src-tauri/resources/typst
          chmod +x src-tauri/resources/typst

      - name: Download Typst binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "0.14.0"
          $TARGET = "${{ matrix.typst_target }}"
          $URL = "https://github.com/typst/typst/releases/download/v${VERSION}/typst-${TARGET}.zip"
          Write-Host "Downloading typst from $URL"
          Invoke-WebRequest -Uri $URL -OutFile "$env:TEMP\typst-archive.zip"
          Expand-Archive -Path "$env:TEMP\typst-archive.zip" -DestinationPath "$env:TEMP\typst-extract" -Force
          Copy-Item -Path "$env:TEMP\typst-extract\typst-${TARGET}\typst.exe" -Destination "src-tauri\resources\typst.exe" -Force

      - run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: lextyp-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: lextyp-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: lextyp-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
