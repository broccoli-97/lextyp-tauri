name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Patch version in all config files to match the tag
      - name: Patch version (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            let toml = fs.readFileSync('src-tauri/Cargo.toml','utf8');
            toml = toml.replace(/^version = \".*\"/m, 'version = \"$VERSION\"');
            fs.writeFileSync('src-tauri/Cargo.toml', toml);
          "

      - name: Patch version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $VERSION
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.version = $VERSION
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          (Get-Content src-tauri/Cargo.toml -Raw) -replace '(?m)^(version\s*=\s*)"[^"]*"', "`$1`"$VERSION`"" | Set-Content src-tauri/Cargo.toml

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Collect artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true

      - name: Collect artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/dmg/*.dmg artifacts/ 2>/dev/null || true

      - name: Collect artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item -Path "src-tauri\target\release\bundle\msi\*.msi" -Destination artifacts -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri\target\release\bundle\nsis\*.exe" -Destination artifacts -ErrorAction SilentlyContinue

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: artifacts/*
          if-no-files-found: warn

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
