name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            typst_target: x86_64-unknown-linux-musl
            typst_ext: tar.xz
          - os: macos-latest
            label: macos
            typst_target: aarch64-apple-darwin
            typst_ext: tar.xz
          - os: windows-latest
            label: windows
            typst_target: x86_64-pc-windows-msvc
            typst_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Patch version in all config files to match the tag
      - name: Patch version (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          sed -i '0,/^version = ".*"/s//version = "'"$VERSION"'"/' src-tauri/Cargo.toml

      - name: Patch version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $VERSION
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.version = $VERSION
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          (Get-Content src-tauri/Cargo.toml -Raw) -replace '(?m)^(version\s*=\s*)"[^"]*"', "`$1`"$VERSION`"" | Set-Content src-tauri/Cargo.toml

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download Typst binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          VERSION="0.14.0"
          TARGET="${{ matrix.typst_target }}"
          EXT="${{ matrix.typst_ext }}"
          URL="https://github.com/typst/typst/releases/download/v${VERSION}/typst-${TARGET}.${EXT}"
          echo "Downloading typst from $URL"
          curl -L -o /tmp/typst-archive.${EXT} "$URL"
          tar xf /tmp/typst-archive.${EXT} -C /tmp --strip-components=1 "typst-${TARGET}/typst"
          cp /tmp/typst src-tauri/resources/typst
          chmod +x src-tauri/resources/typst

      - name: Download Typst binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "0.14.0"
          $TARGET = "${{ matrix.typst_target }}"
          $URL = "https://github.com/typst/typst/releases/download/v${VERSION}/typst-${TARGET}.zip"
          Write-Host "Downloading typst from $URL"
          Invoke-WebRequest -Uri $URL -OutFile "$env:TEMP\typst-archive.zip"
          Expand-Archive -Path "$env:TEMP\typst-archive.zip" -DestinationPath "$env:TEMP\typst-extract" -Force
          Copy-Item -Path "$env:TEMP\typst-extract\typst-${TARGET}\typst.exe" -Destination "src-tauri\resources\typst.exe" -Force

      - run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Collect artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage artifacts/ 2>/dev/null || true

      - name: Collect artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/dmg/*.dmg artifacts/ 2>/dev/null || true

      - name: Collect artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item -Path "src-tauri\target\release\bundle\msi\*.msi" -Destination artifacts -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri\target\release\bundle\nsis\*.exe" -Destination artifacts -ErrorAction SilentlyContinue

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: artifacts/*
          if-no-files-found: warn

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
