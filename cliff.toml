# git-cliff configuration — generates release notes from Conventional Commits.
# Used by .github/workflows/release.yml via orhun/git-cliff-action.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits -%}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

# Normalise non-standard prefixes used in this repo's history before parsing.
commit_preprocessors = [
  { pattern = '^\s*bugfix:', replace = "fix:" },
]

commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug Fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     group = "Tests" },
  { message = "^style",    group = "Styling" },
  { message = "^ci",       group = "CI/CD" },
  { message = "^chore",    group = "Miscellaneous" },
]

# Drop commits that don't match any parser (keeps the changelog focused).
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
